<!-- @dsCard group="Brand" viewport="700x170" name="Wordmark & Monogram" subtitle="Prata 'L' monogram (favicon) and the full wordmark" -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../styles.css" />
    <style>
      body {
        margin: 0;
        padding: 28px 36px;
        background: var(--surface-page);
        display: flex;
        align-items: center;
        gap: 44px;
      }
      .mono {
        width: 84px;
        height: 84px;
        border-radius: var(--radius-full);
        background: var(--white);
        border: 1px solid var(--border-hairline);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 52px;
        color: var(--navy);
        line-height: 1;
      }
      .wordmark {
        font-size: 38px;
        color: var(--navy);
        letter-spacing: var(--tracking-hero);
        line-height: 1.1;
      }
      .wordmark small {
        display: block;
        font-size: 17px;
        color: var(--text-subtitle);
        letter-spacing: 0;
      }
    </style>
  </head>
  <body>
    <div class="mono">L</div>
    <div class="wordmark">Luciano Perezzini<small>Technologist</small></div>
  </body>
</html>
