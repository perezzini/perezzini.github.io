<!-- @dsCard group="Colors" viewport="700x150" name="Brand Ink" subtitle="Navy — the single brand color, used for text, links & fills" -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../styles.css" />
    <style>
      body {
        margin: 0;
        padding: 20px;
        background: var(--surface-page);
        display: flex;
        gap: 14px;
      }
      .swatch {
        flex: 1;
        height: 110px;
        border-radius: var(--radius-sm);
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        padding: 12px;
        box-sizing: border-box;
        border: 1px solid var(--border-hairline);
      }
      .swatch .name {
        font-size: 14px;
        line-height: 1.3;
      }
      .swatch .hex {
        font-size: 12px;
        opacity: 0.8;
      }
      .on-dark .name,
      .on-dark .hex {
        color: var(--text-on-navy);
      }
      .on-light .name,
      .on-light .hex {
        color: var(--text-primary);
      }
    </style>
  </head>
  <body>
    <div class="swatch on-dark" style="background: var(--navy)">
      <span class="name">Navy</span><span class="hex">#01377D · --navy</span>
    </div>
    <div class="swatch on-dark" style="background: var(--navy-bright)">
      <span class="name">Navy Bright</span><span class="hex">#1A6ABF · --navy-bright</span>
    </div>
    <div class="swatch on-light" style="background: var(--navy-subtitle)">
      <span class="name" style="color:#fff">Subtitle Navy</span><span class="hex" style="color:#fff">#4A6F94 · --navy-subtitle</span>
    </div>
  </body>
</html>
