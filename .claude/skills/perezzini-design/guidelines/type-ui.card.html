<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../styles.css" />
    <style>
      body {
        margin: 0;
        padding: 28px 32px;
        background: var(--surface-page);
        display: flex;
        align-items: center;
        gap: 36px;
      }
      .col .spec {
        font-size: 12px;
        color: var(--text-secondary);
        margin-bottom: 8px;
      }
      .meta {
        font-size: var(--text-meta);
        color: var(--text-secondary);
      }
      .navlink {
        font-size: var(--text-meta);
        color: var(--text-primary);
        background: var(--navy);
        color: #fff;
        padding: 6px 16px;
        border-radius: var(--radius-pill);
      }
      .button-text {
        font-size: var(--text-button);
        color: var(--text-primary);
      }
    </style>
  </head>
  <body>
    <div class="col">
      <div class="spec">Nav · 13px</div>
      <span class="navlink">Essays</span>
    </div>
    <div class="col">
      <div class="spec">Button · 15px</div>
      <span class="button-text">Resume</span>
    </div>
    <div class="col">
      <div class="spec">Meta · 13px</div>
      <span class="meta">May 31, 2026</span>
    </div>
  </body>
</html>
