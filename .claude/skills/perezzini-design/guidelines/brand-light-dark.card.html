<!-- @dsCard group="Brand" viewport="700x300" name="Light / Dark" subtitle="The same column, both themes — monochrome invert" -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../styles.css" />
    <style>
      body {
        margin: 0;
        display: flex;
        font-family: var(--font-display);
      }
      .pane {
        flex: 1;
        padding: 28px 26px;
        min-height: 244px;
        box-sizing: border-box;
        background: var(--surface-page);
      }
      .pane + .pane {
        border-left: 1px solid #00000018;
      }
      .avatar {
        width: 56px;
        height: 56px;
        border-radius: var(--radius-full);
        object-fit: cover;
        display: block;
        box-shadow: var(--ring-avatar);
      }
      .name {
        font-size: 22px;
        color: var(--text-primary);
        letter-spacing: var(--tracking-hero);
        margin: 14px 0 2px;
      }
      .sub {
        font-size: 14px;
        color: var(--text-subtitle);
        margin: 0 0 14px;
      }
      .row {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        padding: 8px 18px;
        border-radius: var(--radius-pill);
        font-size: var(--text-button);
        line-height: 1;
        border: 1px solid transparent;
      }
      .btn-primary {
        background: var(--btn-primary-bg);
        color: var(--btn-primary-fg);
        border-color: var(--btn-primary-bg);
      }
      .btn-outline {
        background: transparent;
        color: var(--btn-outline-fg);
        border-color: var(--btn-outline-border);
      }
      .tag {
        background: var(--surface-subtle);
        color: var(--tag-fg);
        font-size: var(--text-meta);
        padding: 4px 11px;
        border-radius: var(--radius-pill);
      }
      .cap {
        font-size: 11px;
        color: var(--text-secondary);
        margin-top: 16px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div class="pane" data-theme="light">
      <img class="avatar" src="../assets/profile-1.jpeg" alt="" />
      <div class="name">Luciano Perezzini</div>
      <div class="sub">Technologist</div>
      <div class="row">
        <span class="btn btn-primary">Resume</span>
        <span class="btn btn-outline">Contact</span>
        <span class="tag">NLP</span>
      </div>
      <div class="cap">Light</div>
    </div>
    <div class="pane" data-theme="dark">
      <img class="avatar" src="../assets/profile-1.jpeg" alt="" />
      <div class="name">Luciano Perezzini</div>
      <div class="sub">Technologist</div>
      <div class="row">
        <span class="btn btn-primary">Resume</span>
        <span class="btn btn-outline">Contact</span>
        <span class="tag">NLP</span>
      </div>
      <div class="cap">Dark</div>
    </div>
  </body>
</html>
