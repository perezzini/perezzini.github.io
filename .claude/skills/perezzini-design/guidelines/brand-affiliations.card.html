<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../styles.css" />
    <style>
      body {
        margin: 0;
        padding: 24px 36px;
        background: var(--surface-page);
        display: flex;
        align-items: center;
        gap: 48px;
      }
      .item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }
      .item img {
        height: 80px;
        width: auto;
        object-fit: contain;
      }
      .label {
        font-size: 12px;
        color: var(--text-secondary);
      }
    </style>
  </head>
  <body>
    <div class="item">
      <img src="../assets/unr-2.jpg" alt="Universidad Nacional de Rosario" />
      <span class="label">UNR seal</span>
    </div>
    <div class="item">
      <img src="../assets/lcc.png" alt="Licenciatura en Ciencias de la Computación" />
      <span class="label">LCC monogram</span>
    </div>
  </body>
</html>
