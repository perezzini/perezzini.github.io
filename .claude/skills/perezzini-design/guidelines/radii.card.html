<!-- @dsCard group="Spacing" viewport="700x150" name="Radii" subtitle="Fully-pill chrome (980px), soft cards, circular avatars" -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../styles.css" />
    <style>
      body {
        margin: 0;
        padding: 24px 32px;
        background: var(--surface-page);
        display: flex;
        align-items: center;
        gap: 28px;
      }
      .item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }
      .box {
        width: 88px;
        height: 64px;
        background: var(--white);
        border: 1px solid var(--navy);
      }
      .pill {
        width: 110px;
        border-radius: var(--radius-pill);
      }
      .label {
        font-size: 12px;
        color: var(--text-secondary);
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="item">
      <div class="box pill"></div>
      <span class="label">Pill · 980px</span>
    </div>
    <div class="item">
      <div class="box" style="border-radius: var(--radius-card)"></div>
      <span class="label">Card · 18px</span>
    </div>
    <div class="item">
      <div class="box" style="border-radius: var(--radius-sm)"></div>
      <span class="label">Small · 10px</span>
    </div>
    <div class="item">
      <div class="box" style="width:64px;border-radius: var(--radius-full)"></div>
      <span class="label">Full · avatar</span>
    </div>
  </body>
</html>
