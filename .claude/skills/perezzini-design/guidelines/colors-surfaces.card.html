<!-- @dsCard group="Colors" viewport="700x150" name="Paper & Surfaces" subtitle="Warm cream page, Apple-light wells, white cards" -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../styles.css" />
    <style>
      body {
        margin: 0;
        padding: 20px;
        background: var(--surface-page);
        display: flex;
        gap: 14px;
      }
      .swatch {
        flex: 1;
        height: 110px;
        border-radius: var(--radius-sm);
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        padding: 12px;
        box-sizing: border-box;
        border: 1px solid var(--border-hairline);
      }
      .name {
        font-size: 14px;
        line-height: 1.3;
        color: var(--text-primary);
      }
      .hex {
        font-size: 12px;
        color: var(--text-secondary);
      }
    </style>
  </head>
  <body>
    <div class="swatch" style="background: var(--paper)">
      <span class="name">Paper</span><span class="hex">#F0EDE8 · --paper</span>
    </div>
    <div class="swatch" style="background: var(--surface-light)">
      <span class="name">Surface Light</span><span class="hex">#F5F5F7 · --surface-light</span>
    </div>
    <div class="swatch" style="background: var(--white)">
      <span class="name">White</span><span class="hex">#FFFFFF · --white</span>
    </div>
  </body>
</html>
