<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../../styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
    <script src="../../_ds_bundle.js"></script>
    <style>
      body {
        margin: 0;
        padding: 28px 32px;
        background: var(--surface-page);
      }
      .group {
        margin-bottom: 26px;
      }
      .glabel {
        font-size: 12px;
        color: var(--text-secondary);
        margin-bottom: 12px;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 14px;
        flex-wrap: wrap;
      }
      .divider {
        height: 1px;
        background: var(--border-hairline);
        margin: 0 0 26px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { Button, Tag, Avatar, SocialIcon, NavPill, BlogCard } =
        window.PerezziniDesignSystem_33c6f1

      function Group({ label, children }) {
        return (
          <div className="group">
            <div className="glabel">{label}</div>
            <div className="row">{children}</div>
          </div>
        )
      }

      function Demo() {
        return (
          <div>
            <Group label="Button · primary / outline / disabled">
              <Button variant="primary" icon="fa-solid fa-cloud-arrow-down">Resume</Button>
              <Button variant="outline" icon="fa-regular fa-envelope">Contact Me</Button>
              <Button variant="primary" disabled>Disabled</Button>
            </Group>
            <div className="divider"></div>
            <Group label="Tag">
              <Tag>Information Retrieval</Tag>
              <Tag>NLP</Tag>
              <Tag>LegalTech</Tag>
            </Group>
            <div className="divider"></div>
            <Group label="Avatar · ring / plain">
              <Avatar src="../../assets/profile-1.jpeg" alt="Luciano" size={72} />
              <Avatar src="../../assets/profile-1.jpeg" alt="Luciano" size={72} ring={false} />
              <SocialIcon icon="fa-brands fa-linkedin-in" href="#" label="LinkedIn" />
              <SocialIcon icon="fa-brands fa-github" href="#" label="GitHub" />
            </Group>
            <div className="divider"></div>
            <Group label="NavPill">
              <NavPill
                floating={false}
                active="Essays"
                items={[
                  { label: 'Home', href: '#' },
                  { label: 'Essays', href: '#' },
                  { label: 'Academic publications', href: '#' },
                ]}
              />
            </Group>
            <div className="divider"></div>
            <Group label="BlogCard">
              <div style={{ width: '100%', maxWidth: 440 }}>
                <BlogCard
                  date="May 31, 2026"
                  title="Hello, World"
                  description="The first post on this site — a brief note on why I'm starting to write."
                  href="#"
                />
              </div>
            </Group>
          </div>
        )
      }
      ReactDOM.createRoot(document.getElementById('root')).render(<Demo />)
    </script>
  </body>
</html>
